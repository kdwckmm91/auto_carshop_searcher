name: 中古車自動巡回 (N-BOX)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

# Node.js 24への強制移行警告に対応
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:    
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 20から最新の24に変更
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      # 全ての working-directory 指定を削除しました
      - name: 依存パッケージのインストール
        run: npm ci

      - name: Playwright Chromium のインストール
        run: npx playwright install chromium --with-deps

      - name: config.json の生成（Secrets から）
        run: |
          cat > config.json << 'EOF'
          {
            "spreadsheet_id": "${{ secrets.SPREADSHEET_ID }}",
            "sheet_name": "N-BOX在庫",
            "line_token": "${{ secrets.LINE_NOTIFY_TOKEN }}",
            "headless": true,
            "delay_min_ms": 2000,
            "delay_max_ms": 5000,
            "enabled_scrapers": ["carsensor", "goonet"]
          }
          EOF

      - name: スクレイピング実行
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: npm start